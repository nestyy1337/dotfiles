# History & colors
set-option -g history-limit 100000
set -g default-terminal "screen-256color"
set -as terminal-features ",xterm-256color:RGB"
set-option -sa terminal-overrides ",xterm*:Tc"

# Plugins are managed by nix (sensible, yank, vim-tmux-navigator, resurrect)

# Resurrect settings
set -g @resurrect-save 'M'
set -g @resurrect-restore 'B'

# Vi mode
setw -g mode-keys vi

# Copy mode
bind-key -T root C-M-u copy-mode
bind-key -T copy-mode-vi 'v' send-keys -X begin-selection
bind-key -T copy-mode-vi 'y' send-keys -X copy-selection-and-cancel

# Prefix
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Window indexing
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Switch to last window
bind-key -n C-q last-window

# Status bar (Rose Pine)
set -g status-right ''
set -g status-right-length 0
set -g status-style bg='#1f1d2e',fg='#908caa'
setw -g window-status-current-style bg='#26233a',fg='#e0def4',bold
setw -g window-status-style bg='#1f1d2e',fg='#6e6a86'

# Misc
set-option -g focus-events on
set -ga terminal-features "*:hyperlinks"
set -sg escape-time 10
set -g set-titles on
set -g set-titles-string "#T"
set -g mouse on

# Preserve SSH agent
set -g update-environment "SSH_AUTH_SOCK"
